<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D RACK Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:'Malgun Gothic',sans-serif}
#loading{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0d1117;z-index:9999;gap:16px}
#loading-text{color:#7c3aed;font-size:15px;letter-spacing:.08em}
#loading-bar{width:200px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden}
#loading-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);width:0%;
  transition:width .4s ease;border-radius:2px}
#hint{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:#475569;font-size:9px;padding:4px 14px;
  border-radius:20px;pointer-events:none;letter-spacing:.06em;font-family:monospace;
  border:1px solid #1e293b}
#tooltip{
  position:fixed;display:none;background:rgba(10,18,32,.95);color:#e2e8f0;
  font-size:12px;padding:10px 14px;border-radius:9px;border:1px solid #1e3a5f;
  pointer-events:none;z-index:200;line-height:1.7;
  box-shadow:0 6px 24px rgba(0,0,0,.5);min-width:160px}
.tt-title{font-weight:800;color:#a78bfa;font-size:13px;margin-bottom:3px}
.tt-sub{color:#475569;font-size:10px;margin-top:4px}
#empty-msg{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:#1e3a5f;font-size:15px;gap:12px;pointer-events:none}
#empty-msg .ei{font-size:48px;opacity:.3}
</style>
</head>
<body>

<div id="loading">
  <div class="ei" style="font-size:36px">🏗</div>
  <div id="loading-text">3D 엔진 초기화 중...</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<div id="hint">🖱 드래그: 회전 &nbsp;|&nbsp; 스크롤: 줌 &nbsp;|&nbsp; 클릭: 셀 선택</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div id="tt-body"></div>
  <div class="tt-sub" id="tt-sub">클릭하여 팔레트 할당 / 수정</div>
</div>

<div id="empty-msg" style="display:none">
  <div class="ei">📦</div>
  <span>등록된 RACK이 없습니다</span>
  <span style="font-size:12px;color:#334155">관리자 패널에서 RACK을 추가하세요</span>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/controls/OrbitControls.js';

// ── Loading progress ──────────────────────────────────────────
const fill = document.getElementById('loading-fill');
function progress(pct) { fill.style.width = pct + '%'; }
progress(20);

// ── Renderer ─────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);
progress(40);

// ── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.FogExp2(0x0d1117, 0.016);

// ── Camera ────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 8, 18);

// ── Controls ──────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.minDistance    = 2;
controls.maxDistance    = 80;
controls.maxPolarAngle  = Math.PI * 0.87;
controls.target.set(0, 2, 0);
controls.update();
progress(60);

// ── Lights ────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x8baabe, 0.7);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(12, 22, 12);
sun.castShadow = true;
sun.shadow.mapSize.width  = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 80;
sun.shadow.camera.left = sun.shadow.camera.bottom = -25;
sun.shadow.camera.right = sun.shadow.camera.top   =  25;
sun.shadow.bias = -0.0005;
scene.add(sun);

const fill2 = new THREE.DirectionalLight(0x4466dd, 0.55);
fill2.position.set(-10, 6, -8);
scene.add(fill2);

const bluePt = new THREE.PointLight(0x1d4ed8, 2.0, 30);
bluePt.position.set(0, 1, 3);
scene.add(bluePt);

// ── Floor ─────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(80, 80);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0e1520, metalness: 0.15, roughness: 0.95
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(80, 40, 0x1e3a5f, 0x111e30);
grid.position.y = 0.002;
scene.add(grid);

// ── Shared Materials ──────────────────────────────────────────
const steelMat = new THREE.MeshStandardMaterial({
  color: 0xa0b0c4, metalness: 0.85, roughness: 0.20
});
const shelfMat = new THREE.MeshStandardMaterial({
  color: 0x5a6880, metalness: 0.72, roughness: 0.40
});
const divMat = new THREE.MeshStandardMaterial({
  color: 0x3a4a5a, metalness: 0.65, roughness: 0.55
});

// ── Constants ─────────────────────────────────────────────────
const CW = 1.30; // cell width
const CH = 1.10; // cell height
const CD = 0.90; // cell depth
const PT = 0.065; // post thickness
const SH = 0.048; // shelf height

// ── State ─────────────────────────────────────────────────────
let rackGroups   = {};     // rackId → THREE.Group
let clickables   = [];     // meshes for raycasting
let highlighted  = null;   // {mesh, origMat}
let highlightT   = 0;
let camTargetPos = null;
let camTargetLook = null;
const CAM_SPEED  = 0.05;

// ── Label Sprite ──────────────────────────────────────────────
function makeSprite(text) {
  const c = document.createElement('canvas');
  c.width = 320; c.height = 72;
  const ctx = c.getContext('2d');
  // background pill
  ctx.fillStyle = 'rgba(91,33,182,0.92)';
  ctx.beginPath();
  if (ctx.roundRect) { ctx.roundRect(3, 3, 314, 66, 14); } else { ctx.rect(3, 3, 314, 66); }
  ctx.fill();
  // border
  ctx.strokeStyle = 'rgba(167,139,250,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 22px Malgun Gothic, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 160, 36);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const spr = new THREE.Sprite(mat);
  spr.scale.set(2.6, 0.58, 1);
  return spr;
}

// ── RACK Builder ──────────────────────────────────────────────
function buildRack(rd) {
  const g      = new THREE.Group();
  const floors = Math.max(1, Number(rd.floors) || 3);
  const cols   = Math.max(1, Number(rd.cols)   || 4);
  const rW     = cols   * CW;
  const rH     = floors * CH;

  // Build occupied cell map
  const occ = {};
  (rd.cells || []).forEach(c => {
    if (c.palletId) occ[`${c.floor}_${c.col}`] = c.palletId;
  });

  // ── Corner posts ──
  const postH   = rH + SH * (floors + 1);
  const postGeo = new THREE.BoxGeometry(PT, postH, PT);
  [[0, 0], [rW, 0], [0, CD], [rW, CD]].forEach(([x, z]) => {
    const m = new THREE.Mesh(postGeo, steelMat.clone());
    m.position.set(x, postH / 2, z);
    m.castShadow = true;
    g.add(m);
  });

  // ── Horizontal shelves ──
  const shGeo = new THREE.BoxGeometry(rW + PT, SH, CD + PT);
  for (let f = 0; f <= floors; f++) {
    const sh = new THREE.Mesh(shGeo, shelfMat.clone());
    sh.position.set(rW / 2, f * CH, CD / 2);
    sh.castShadow = true;
    sh.receiveShadow = true;
    g.add(sh);
  }

  // ── Front/back rails mid-floor ──
  const railGeo = new THREE.BoxGeometry(rW, PT * 0.6, PT * 0.5);
  for (let f = 1; f <= floors; f++) {
    const y = (f - 0.5) * CH;
    [0, CD].forEach(z => {
      const r = new THREE.Mesh(railGeo, steelMat.clone());
      r.position.set(rW / 2, y, z);
      g.add(r);
    });
  }

  // ── Vertical cell dividers ──
  const dGeo = new THREE.BoxGeometry(PT * 0.55, rH, PT * 0.55);
  for (let c = 1; c < cols; c++) {
    const d = new THREE.Mesh(dGeo, divMat.clone());
    d.position.set(c * CW, rH / 2, CD / 2);
    g.add(d);
  }

  // ── Cell pallets / ghosts ──
  const PW = CW * 0.80;
  const PH = CH * 0.74;
  const PD = CD * 0.78;
  const cellGeo = new THREE.BoxGeometry(PW, PH, PD);

  for (let f = 1; f <= floors; f++) {
    for (let c = 1; c <= cols; c++) {
      const key     = `${f}_${c}`;
      const palletId = occ[key] || null;
      const px = (c - 0.5) * CW;
      const py = (f - 0.5) * CH;
      const pz = CD / 2;

      let mat;
      if (palletId) {
        mat = new THREE.MeshStandardMaterial({
          color: 0x16a34a, metalness: 0.08, roughness: 0.62,
          transparent: false, opacity: 1
        });
      } else {
        mat = new THREE.MeshStandardMaterial({
          color: 0x2563eb, metalness: 0.0, roughness: 0.85,
          transparent: true, opacity: 0.14
        });
      }

      const box = new THREE.Mesh(cellGeo.clone(), mat);
      box.position.set(px, py, pz);
      if (palletId) { box.castShadow = true; box.receiveShadow = true; }
      box.userData = {
        type: 'cell', rackId: rd.rackId, rackName: rd.rackName || rd.rackId,
        floor: f, col: c, palletId, occupied: !!palletId
      };
      g.add(box);
      clickables.push(box);

      // Wireframe outline for empty cells
      if (!palletId) {
        const eg  = new THREE.EdgesGeometry(cellGeo.clone());
        const lm  = new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.3 });
        const ls  = new THREE.LineSegments(eg, lm);
        ls.position.set(px, py, pz);
        g.add(ls);
      }
    }
  }

  // ── Rack label sprite ──
  const spr = makeSprite(rd.rackName || rd.rackId);
  spr.position.set(rW / 2, rH + SH * (floors + 1) + 0.45, CD / 2);
  g.add(spr);

  g.userData = { rackId: rd.rackId, rW, rH };
  return g;
}

// ── Scene rebuild ─────────────────────────────────────────────
function rebuildScene(rackList) {
  // Dispose old racks
  Object.values(rackGroups).forEach(g => {
    g.traverse(c => { if (c.isMesh) { c.geometry.dispose(); if (c.material && c.material.dispose) c.material.dispose(); } });
    scene.remove(g);
  });
  rackGroups = {};
  clickables = [];
  highlighted = null;

  const emEl = document.getElementById('empty-msg');
  if (!rackList || !rackList.length) { emEl.style.display = 'flex'; return; }
  emEl.style.display = 'none';

  let offsetX = 0;
  const RACK_GAP = 1.6;
  rackList.forEach(rd => {
    const g  = buildRack(rd);
    const rW = (Number(rd.cols) || 4) * CW;
    g.position.set(offsetX, 0, 0);
    scene.add(g);
    rackGroups[rd.rackId] = g;
    offsetX += rW + RACK_GAP;
  });

  // Center all racks along X
  const totalW = offsetX - RACK_GAP;
  Object.values(rackGroups).forEach(g => { g.position.x -= totalW / 2; });

  // Reset camera to frame all racks
  const maxH   = Math.max(...rackList.map(r => (Number(r.floors) || 3) * CH));
  const camDist = Math.max(totalW * 0.75, 10) + 6;
  camera.position.set(0, maxH * 0.7 + 3, camDist);
  controls.target.set(0, maxH * 0.45, 0);
  controls.update();
  camTargetPos  = null;
  camTargetLook = null;
}

// ── Highlight ─────────────────────────────────────────────────
function highlightCell(rackId, floor, col) {
  clearHighlight();
  const grp = rackGroups[rackId];
  if (!grp) return;
  let found = null;
  grp.traverse(c => {
    if (c.isMesh && c.userData.type === 'cell'
        && c.userData.floor === Number(floor)
        && c.userData.col   === Number(col)) { found = c; }
  });
  if (!found) return;
  highlighted = { mesh: found, origMat: found.material };
  found.material = new THREE.MeshStandardMaterial({
    color: 0xff1a1a, emissive: new THREE.Color(0xff0000),
    emissiveIntensity: 0.9, metalness: 0.1, roughness: 0.35,
    transparent: false
  });
  highlightT = 0;

  // Animate camera to focus
  const wp = new THREE.Vector3();
  found.getWorldPosition(wp);
  camTargetPos  = wp.clone().add(new THREE.Vector3(2.5, 2.0, 4.5));
  camTargetLook = wp.clone();
}

function clearHighlight() {
  if (highlighted) {
    highlighted.mesh.material = highlighted.origMat;
    highlighted = null; highlightT = 0;
  }
  camTargetPos = null;
}

// ── Raycaster / Mouse ─────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
const tooltip   = document.getElementById('tooltip');
let hovered     = null;

function getCanvasMouse(e) {
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width)  *  2 - 1;
  mouse.y = ((e.clientY - r.top)  / r.height) * -2 + 1;
}

renderer.domElement.addEventListener('mousemove', e => {
  getCanvasMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables, false);

  if (hits.length) {
    const u = hits[0].object.userData;
    if (hovered !== hits[0].object) {
      hovered = hits[0].object;
      document.getElementById('tt-title').textContent =
        (u.rackName || u.rackId) + ' · ' + u.floor + 'F · ' + u.col + '번 칸';
      document.getElementById('tt-body').innerHTML = u.palletId
        ? '<span style="color:#4ade80;font-weight:700">● 팔레트 있음</span>  ' + u.palletId
        : '<span style="color:#3b82f6;opacity:.9">○ 비어있음</span>';
    }
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top  = (e.clientY - 8)  + 'px';
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hovered = null;
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', e => {
  getCanvasMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables, false);
  if (hits.length) {
    const u = hits[0].object.userData;
    postUp({ type: 'cellClick', rackId: u.rackId, floor: u.floor,
             col: u.col, palletId: u.palletId, occupied: u.occupied });
    tooltip.style.display = 'none';
  }
});

renderer.domElement.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  hovered = null;
});

// ── postMessage ───────────────────────────────────────────────
function postUp(msg) { try { window.parent.postMessage(msg, '*'); } catch(e) {} }

window.addEventListener('message', e => {
  const d = e.data;
  if (!d || !d.type) return;
  switch (d.type) {
    case 'setRacks':
      rebuildScene(d.racks || []);
      break;
    case 'highlightCell':
      highlightCell(d.rackId, d.floor, d.col);
      break;
    case 'clearHighlight':
      clearHighlight();
      break;
    case 'focusRack': {
      const grp = rackGroups[d.rackId];
      if (grp) {
        const wp = new THREE.Vector3();
        grp.getWorldPosition(wp);
        const rW = grp.userData.rW || 4;
        const rH = grp.userData.rH || 3;
        camTargetPos  = new THREE.Vector3(wp.x + rW / 2, rH * 0.6 + 2, wp.z + rW * 0.8 + 6);
        camTargetLook = new THREE.Vector3(wp.x + rW / 2, rH / 2, wp.z);
      }
      break;
    }
    case 'ping':
      postUp({ type: 'rackViewerReady' });
      break;
  }
});

// ── Animation loop ────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  // Camera lerp
  if (camTargetPos) {
    camera.position.lerp(camTargetPos, CAM_SPEED);
    controls.target.lerp(camTargetLook, CAM_SPEED);
  }
  controls.update();

  // Highlight pulse
  if (highlighted) {
    highlightT += 0.045;
    const p = Math.sin(highlightT * 3.2) * 0.5 + 0.5;
    highlighted.mesh.material.emissiveIntensity = 0.3 + p * 1.2;
    highlighted.mesh.scale.setScalar(1 + p * 0.035);
  }

  renderer.render(scene, camera);
}

// ── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ── Init complete ─────────────────────────────────────────────
progress(100);
setTimeout(() => {
  const loadEl = document.getElementById('loading');
  if (loadEl) { loadEl.style.opacity = '0'; loadEl.style.transition = 'opacity .4s'; setTimeout(() => loadEl.remove(), 400); }
  animate();
  postUp({ type: 'rackViewerReady' });
}, 300);
</script>
</body>
</html>
