<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D RACK Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:'Malgun Gothic',sans-serif}
#loading{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0d1117;z-index:9999;gap:16px}
#loading-text{color:#7c3aed;font-size:15px;letter-spacing:.08em}
#loading-bar{width:200px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden}
#loading-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);width:0%;
  transition:width .4s ease;border-radius:2px}
#hint{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:#475569;font-size:9px;padding:4px 14px;
  border-radius:20px;pointer-events:none;letter-spacing:.06em;font-family:monospace;
  border:1px solid #1e293b}
#tooltip{
  position:fixed;display:none;background:rgba(10,18,32,.95);color:#e2e8f0;
  font-size:12px;padding:10px 14px;border-radius:9px;border:1px solid #1e3a5f;
  pointer-events:none;z-index:200;line-height:1.7;
  box-shadow:0 6px 24px rgba(0,0,0,.5);min-width:160px}
.tt-title{font-weight:800;color:#a78bfa;font-size:13px;margin-bottom:3px}
.tt-sub{color:#475569;font-size:10px;margin-top:4px}
#empty-msg{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:#1e3a5f;font-size:15px;gap:12px;pointer-events:none}
#empty-msg .ei{font-size:48px;opacity:.3}
</style>
</head>
<body>

<div id="loading">
  <div class="ei" style="font-size:36px">🏗</div>
  <div id="loading-text">3D 엔진 초기화 중...</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<div id="hint">🖱 드래그: 회전 &nbsp;|&nbsp; 스크롤: 줌 &nbsp;|&nbsp; 클릭: 셀 선택</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div id="tt-body"></div>
  <div class="tt-sub" id="tt-sub">클릭하여 팔레트 할당 / 수정</div>
</div>

<div id="empty-msg" style="display:none">
  <div class="ei">📦</div>
  <span>등록된 RACK이 없습니다</span>
  <span style="font-size:12px;color:#334155">관리자 패널에서 RACK을 추가하세요</span>
</div>

<!-- UMD 빌드: ES 모듈 불필요, 일반 script 태그로 로드 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
'use strict';

var fill = document.getElementById('loading-fill');
function progress(pct) { if (fill) fill.style.width = pct + '%'; }
function showError(msg) {
  var lt = document.getElementById('loading-text');
  if (lt) { lt.textContent = msg; lt.style.color = '#ef4444'; }
}

// Three.js 로드 확인
if (typeof THREE === 'undefined') { showError('Three.js 로드 실패 — 네트워크를 확인하세요'); return; }
progress(20);

// ── Renderer ────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'default' });
renderer.setPixelRatio(1);   // 고정 1x — iframe 내부에서 2x는 GPU OOM 유발
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;  // 섀도우맵 비활성 — 2048 텍스처가 탭 크래시 원인
renderer.toneMapping = THREE.LinearToneMapping;
document.body.appendChild(renderer.domElement);
progress(40);

// ── Scene ───────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
// fog 제거 — FogExp2 계산 비용 절감

// ── Camera ──────────────────────────────────────────────────────
var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 8, 18);

// ── Controls ────────────────────────────────────────────────────
var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance   = 2;
controls.maxDistance   = 80;
controls.maxPolarAngle = Math.PI * 0.87;
controls.target.set(0, 2, 0);
controls.update();
progress(60);

// ── Lights ──────────────────────────────────────────────────────
var ambient = new THREE.AmbientLight(0x8baabe, 0.7);
scene.add(ambient);

var sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(12, 22, 12);
scene.add(sun);

var fillLight = new THREE.DirectionalLight(0x4466dd, 0.55);
fillLight.position.set(-10, 6, -8);
scene.add(fillLight);

var bluePt = new THREE.PointLight(0x1d4ed8, 2.0, 30);
bluePt.position.set(0, 1, 3);
scene.add(bluePt);

// ── Floor ───────────────────────────────────────────────────────
var floorGeo = new THREE.PlaneGeometry(80, 80);
var floorMat = new THREE.MeshStandardMaterial({ color: 0x0e1520, metalness: 0.15, roughness: 0.95 });
var floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

var grid = new THREE.GridHelper(80, 40, 0x1e3a5f, 0x111e30);
grid.position.y = 0.002;
scene.add(grid);

// ── Shared Materials ────────────────────────────────────────────
var steelMat = new THREE.MeshStandardMaterial({ color: 0xa0b0c4, metalness: 0.85, roughness: 0.20 });
var shelfMat = new THREE.MeshStandardMaterial({ color: 0x5a6880, metalness: 0.72, roughness: 0.40 });
var divMat   = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, metalness: 0.65, roughness: 0.55 });

// ── Constants ───────────────────────────────────────────────────
var CW = 1.30, CH = 1.10, CD = 0.90, PT = 0.065, SH = 0.048;

// ── State ───────────────────────────────────────────────────────
var rackGroups   = {};
var clickables   = [];
var highlighted  = null;
var highlightT   = 0;
var camTargetPos  = null;
var camTargetLook = null;
var CAM_SPEED = 0.05;

// ── Label Sprite ────────────────────────────────────────────────
function makeSprite(text) {
  var c = document.createElement('canvas');
  c.width = 320; c.height = 72;
  var ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(91,33,182,0.92)';
  ctx.beginPath();
  ctx.rect(3, 3, 314, 66);
  ctx.fill();
  ctx.strokeStyle = 'rgba(167,139,250,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 22px Malgun Gothic, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 160, 36);
  var tex = new THREE.CanvasTexture(c);
  var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  var spr = new THREE.Sprite(mat);
  spr.scale.set(2.6, 0.58, 1);
  return spr;
}

// ── RACK Builder ────────────────────────────────────────────────
function buildRack(rd) {
  var g      = new THREE.Group();
  var floors = Math.max(1, Number(rd.floors) || 3);
  var cols   = Math.max(1, Number(rd.cols)   || 4);
  var rows   = Math.max(1, Number(rd.rows)   || 1);
  var rW = cols  * CW;
  var rH = floors * CH;
  var rD = rows  * CD;

  var occ = {};
  (rd.cells || []).forEach(function(cell) {
    if (cell.palletId) occ[cell.floor + '_' + (cell.row || 1) + '_' + cell.col] = cell.palletId;
  });

  // Corner posts (4 outer corners)
  var postH   = rH + SH * (floors + 1);
  var postGeo = new THREE.BoxGeometry(PT, postH, PT);
  [[0, 0], [rW, 0], [0, rD], [rW, rD]].forEach(function(xz) {
    var m = new THREE.Mesh(postGeo, steelMat.clone());
    m.position.set(xz[0], postH / 2, xz[1]);

    g.add(m);
  });

  // Intermediate row posts (rows > 1)
  for (var rowIdx = 1; rowIdx < rows; rowIdx++) {
    var rz = rowIdx * CD;
    [[0, rz], [rW, rz]].forEach(function(xz) {
      var mp = new THREE.Mesh(postGeo, steelMat.clone());
      mp.position.set(xz[0], postH / 2, xz[1]);
      g.add(mp);
    });
  }

  // Shelves (full depth rD)
  var shGeo = new THREE.BoxGeometry(rW + PT, SH, rD + PT);
  for (var f = 0; f <= floors; f++) {
    var sh = new THREE.Mesh(shGeo, shelfMat.clone());
    sh.position.set(rW / 2, f * CH, rD / 2);
    g.add(sh);
  }

  // Front/back/row rails (along X axis, one per row boundary per floor)
  var railGeo = new THREE.BoxGeometry(rW, PT * 0.6, PT * 0.5);
  for (var fr = 1; fr <= floors; fr++) {
    var y = (fr - 0.5) * CH;
    for (var rowIdx = 0; rowIdx <= rows; rowIdx++) {
      var rl = new THREE.Mesh(railGeo, steelMat.clone());
      rl.position.set(rW / 2, y, rowIdx * CD);
      g.add(rl);
    }
  }

  // Side rails (along Z axis, at X=0 and X=rW)
  var sideRailGeo = new THREE.BoxGeometry(PT * 0.5, PT * 0.6, rD);
  for (var fr = 1; fr <= floors; fr++) {
    var y = (fr - 0.5) * CH;
    [0, rW].forEach(function(x) {
      var rl = new THREE.Mesh(sideRailGeo, steelMat.clone());
      rl.position.set(x, y, rD / 2);
      g.add(rl);
    });
  }

  // Column dividers (vertical, runs full depth)
  var dGeo = new THREE.BoxGeometry(PT * 0.55, rH, rD);
  for (var ci = 1; ci < cols; ci++) {
    var dv = new THREE.Mesh(dGeo, divMat.clone());
    dv.position.set(ci * CW, rH / 2, rD / 2);
    g.add(dv);
  }

  // Row dividers (perpendicular to depth — only when rows > 1)
  if (rows > 1) {
    var rdGeo = new THREE.BoxGeometry(rW, rH, PT * 0.55);
    for (var rowIdx = 1; rowIdx < rows; rowIdx++) {
      var rdv = new THREE.Mesh(rdGeo, divMat.clone());
      rdv.position.set(rW / 2, rH / 2, rowIdx * CD);
      g.add(rdv);
    }
  }

  // Cell boxes (floor × row × col)
  var PW = CW * 0.80, PH = CH * 0.74, PD = CD * 0.78;
  var cellGeo = new THREE.BoxGeometry(PW, PH, PD);

  for (var fl = 1; fl <= floors; fl++) {
    for (var rw = 1; rw <= rows; rw++) {
      for (var col = 1; col <= cols; col++) {
        var key      = fl + '_' + rw + '_' + col;
        var palletId = occ[key] || null;
        var px = (col - 0.5) * CW;
        var py = (fl  - 0.5) * CH;
        var pz = (rw  - 0.5) * CD;

        var mat;
        if (palletId) {
          mat = new THREE.MeshStandardMaterial({ color: 0x16a34a, metalness: 0.08, roughness: 0.62 });
        } else {
          mat = new THREE.MeshStandardMaterial({ color: 0x2563eb, transparent: true, opacity: 0.14, roughness: 0.85 });
        }

        var box = new THREE.Mesh(cellGeo.clone(), mat);
        box.position.set(px, py, pz);
        box.userData = {
          type: 'cell', rackId: rd.rackId, rackName: rd.rackName || rd.rackId,
          floor: fl, row: rw, col: col, palletId: palletId, occupied: !!palletId
        };
        g.add(box);
        clickables.push(box);

        if (!palletId) {
          var eg = new THREE.EdgesGeometry(cellGeo.clone());
          var lm = new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.3 });
          var ls = new THREE.LineSegments(eg, lm);
          ls.position.set(px, py, pz);
          g.add(ls);
        }
      }
    }
  }

  // Label
  var spr = makeSprite(rd.rackName || rd.rackId);
  spr.position.set(rW / 2, rH + SH * (floors + 1) + 0.45, rD / 2);
  g.add(spr);

  g.userData = { rackId: rd.rackId, rW: rW, rH: rH, rD: rD };
  return g;
}

// ── Scene rebuild ───────────────────────────────────────────────
function rebuildScene(rackList) {
  Object.keys(rackGroups).forEach(function(k) {
    var grp = rackGroups[k];
    grp.traverse(function(c) {
      if (c.isMesh) { c.geometry.dispose(); if (c.material && c.material.dispose) c.material.dispose(); }
    });
    scene.remove(grp);
  });
  rackGroups = {}; clickables = []; highlighted = null;

  var emEl = document.getElementById('empty-msg');
  if (!rackList || !rackList.length) { emEl.style.display = 'flex'; return; }
  emEl.style.display = 'none';

  var offsetX = 0, RACK_GAP = 1.6;
  rackList.forEach(function(rd) {
    var g  = buildRack(rd);
    var rW = (Number(rd.cols) || 4) * CW;
    g.position.set(offsetX, 0, 0);
    scene.add(g);
    rackGroups[rd.rackId] = g;
    offsetX += rW + RACK_GAP;
  });

  var totalW = offsetX - RACK_GAP;
  Object.keys(rackGroups).forEach(function(k) { rackGroups[k].position.x -= totalW / 2; });

  var maxH = 0, maxD = 0;
  rackList.forEach(function(r) {
    maxH = Math.max(maxH, (Number(r.floors) || 3) * CH);
    maxD = Math.max(maxD, (Number(r.rows)   || 1)  * CD);
  });
  var camDist = Math.max(totalW * 0.75, 10) + 6 + maxD;
  camera.position.set(0, maxH * 0.7 + 3, camDist);
  controls.target.set(0, maxH * 0.45, maxD / 2);
  controls.update();
  camTargetPos = null; camTargetLook = null;
}

// ── Highlight ───────────────────────────────────────────────────
function highlightCell(rackId, floor, row, col) {
  clearHighlight();
  var grp = rackGroups[rackId];
  if (!grp) return;
  var targetRow = Number(row || 1);
  var found = null;
  grp.traverse(function(c) {
    if (c.isMesh && c.userData.type === 'cell'
        && c.userData.floor === Number(floor)
        && c.userData.row   === targetRow
        && c.userData.col   === Number(col)) { found = c; }
  });
  if (!found) return;
  highlighted = { mesh: found, origMat: found.material };
  found.material = new THREE.MeshStandardMaterial({
    color: 0xff1a1a, emissive: new THREE.Color(0xff0000),
    emissiveIntensity: 0.9, metalness: 0.1, roughness: 0.35
  });
  highlightT = 0;
  var wp = new THREE.Vector3();
  found.getWorldPosition(wp);
  camTargetPos  = wp.clone().add(new THREE.Vector3(2.5, 2.0, 4.5));
  camTargetLook = wp.clone();
}

function clearHighlight() {
  if (highlighted) { highlighted.mesh.material = highlighted.origMat; highlighted = null; highlightT = 0; }
  camTargetPos = null;
}

// ── Raycaster ───────────────────────────────────────────────────
var raycaster = new THREE.Raycaster();
var mouse     = new THREE.Vector2();
var tooltip   = document.getElementById('tooltip');
var hovered   = null;

function getCanvasMouse(e) {
  var r = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((e.clientX - r.left) / r.width)  * 2 - 1;
  mouse.y = -((e.clientY - r.top)  / r.height)  * 2 + 1;
}

renderer.domElement.addEventListener('mousemove', function(e) {
  getCanvasMouse(e);
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(clickables, false);
  if (hits.length) {
    var u = hits[0].object.userData;
    if (hovered !== hits[0].object) {
      hovered = hits[0].object;
      document.getElementById('tt-title').textContent = (u.rackName || u.rackId) + ' · ' + u.floor + 'F' + (u.row > 1 ? ' · ' + u.row + '행' : '') + ' · ' + u.col + '칸';
      document.getElementById('tt-body').innerHTML = u.palletId
        ? '<span style="color:#4ade80;font-weight:700">● 팔레트 있음</span>  ' + u.palletId
        : '<span style="color:#3b82f6;opacity:.9">○ 비어있음</span>';
    }
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top  = (e.clientY - 8)  + 'px';
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hovered = null; tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', function(e) {
  getCanvasMouse(e);
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(clickables, false);
  if (hits.length) {
    var u = hits[0].object.userData;
    postUp({ type: 'cellClick', rackId: u.rackId, floor: u.floor, row: u.row, col: u.col, palletId: u.palletId, occupied: u.occupied });
    tooltip.style.display = 'none';
  }
});

renderer.domElement.addEventListener('mouseleave', function() {
  tooltip.style.display = 'none'; hovered = null;
});

// ── postMessage ─────────────────────────────────────────────────
function postUp(msg) { try { window.parent.postMessage(msg, '*'); } catch(e) {} }

window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'setRacks')       { rebuildScene(d.racks || []); }
  else if (d.type === 'highlightCell') { highlightCell(d.rackId, d.floor, d.row, d.col); }
  else if (d.type === 'clearHighlight') { clearHighlight(); }
  else if (d.type === 'focusRack') {
    var grp = rackGroups[d.rackId];
    if (grp) {
      var wp = new THREE.Vector3();
      grp.getWorldPosition(wp);
      var rW = grp.userData.rW || 4, rH = grp.userData.rH || 3, rD2 = grp.userData.rD || CD;
      camTargetPos  = new THREE.Vector3(wp.x + rW / 2, rH * 0.6 + 2, wp.z + rD2 / 2 + rW * 0.8 + 6);
      camTargetLook = new THREE.Vector3(wp.x + rW / 2, rH / 2, wp.z + rD2 / 2);
    }
  }
  else if (d.type === 'ping') { postUp({ type: 'rackViewerReady' }); }
});

// ── Animation loop ──────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (camTargetPos) {
    camera.position.lerp(camTargetPos, CAM_SPEED);
    controls.target.lerp(camTargetLook, CAM_SPEED);
  }
  controls.update();
  if (highlighted) {
    highlightT += 0.045;
    var p = Math.sin(highlightT * 3.2) * 0.5 + 0.5;
    highlighted.mesh.material.emissiveIntensity = 0.3 + p * 1.2;
    highlighted.mesh.scale.setScalar(1 + p * 0.035);
  }
  renderer.render(scene, camera);
}

// ── Resize ──────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  var w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ── Init complete ───────────────────────────────────────────────
progress(100);
setTimeout(function() {
  var loadEl = document.getElementById('loading');
  if (loadEl) {
    loadEl.style.opacity = '0';
    loadEl.style.transition = 'opacity .4s';
    setTimeout(function() { if (loadEl.parentNode) loadEl.parentNode.removeChild(loadEl); }, 400);
  }
  animate();
  postUp({ type: 'rackViewerReady' });
}, 300);

})();
</script>
</body>
</html>
