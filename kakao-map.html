<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Noto Sans KR',system-ui,sans-serif; }
    #map { width:100%; height:100%; }
    #draw-toolbar {
      position:absolute; top:8px; left:50%; transform:translateX(-50%);
      display:none; align-items:center; gap:8px; z-index:10;
      background:rgba(15,76,129,.94); border:1px solid rgba(255,255,255,.18);
      border-radius:10px; padding:7px 10px; font-size:12px; color:#fff; white-space:nowrap;
      box-shadow:0 8px 24px rgba(15,23,42,.28);
    }
    #draw-toolbar.visible { display:flex; }
    #draw-toolbar b { color:#FDE68A; font-weight:800; }
    .draw-btn {
      padding:5px 12px; color:#fff; border:none; border-radius:7px;
      font-size:12px; font-weight:800; cursor:pointer; font-family:inherit;
    }
    #draw-done-btn    { background:#16A34A; }
    #draw-cancel-btn  { background:#DC2626; }
    #draw-confirm-btn { background:#059669; }
    #draw-redo-btn    { background:#0F4C81; }
    #draw-count {
      position:absolute; right:10px; bottom:10px; z-index:10;
      display:none; padding:7px 10px; border-radius:10px;
      background:rgba(15,23,42,.82); color:#fff; font-size:12px; font-weight:800;
      box-shadow:0 8px 20px rgba(15,23,42,.25);
    }
    #draw-count.visible { display:block; }
    @keyframes view-pin-bounce {
      0%,100% { transform:translateY(-2px); }
      50% { transform:translateY(-13px); }
    }
    /* 정문 지정 툴바 */
    #gate-toolbar {
      position:absolute; top:8px; left:50%; transform:translateX(-50%);
      display:none; align-items:center; gap:8px; z-index:11;
      background:rgba(5,150,105,.96); border:1px solid rgba(255,255,255,.22);
      border-radius:10px; padding:7px 12px; font-size:12px; color:#fff; white-space:nowrap;
      box-shadow:0 8px 24px rgba(0,0,0,.3);
    }
    #gate-toolbar.visible { display:flex; }
    #gate-toolbar b { color:#FDE68A; }
    /* 적치장명 오버레이 */
    #yard-name-overlay {
      position:absolute; top:10px; left:10px; z-index:20;
      display:none; align-items:center; gap:6px;
      background:rgba(15,23,42,.78); border:1px solid rgba(253,224,71,.35);
      border-radius:8px; padding:5px 12px;
      color:#FDE047; font-size:13px; font-weight:800;
      font-family:'Noto Sans KR',system-ui,sans-serif;
      box-shadow:0 4px 14px rgba(0,0,0,.35); pointer-events:none;
      white-space:nowrap;
    }
    #yard-name-overlay.visible { display:flex; }
  </style>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f95e6bfd50bbf2a72472a4248d6582a9&libraries=services"></script>
</head>
<body>
<div id="map"></div>
<div id="yard-name-overlay"><i>🏭</i><span id="yard-name-text"></span></div>
<div id="gate-toolbar">
  <span>🚧 <b>정문 위치 지정</b> — 지도에서 정문 위치를 클릭하세요</span>
  <button onclick="confirmGate()" style="padding:4px 12px;background:#FDE047;color:#0F172A;border:none;border-radius:7px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit">✓ 확정</button>
  <button onclick="cancelGateMode()" style="padding:4px 10px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit">취소</button>
</div>
<div id="draw-toolbar">
  <span id="hint-draw"><b>구역 지정</b> 꼭짓점을 순서대로 클릭한 뒤 완료를 누르세요.</span>
  <span id="hint-edit" style="display:none"><b>편집 모드</b> 꼭짓점을 드래그하여 조정하세요.</span>
  <button id="draw-ortho-btn"   class="draw-btn" style="background:#475569" onclick="toggleOrtho()">⊾ 직각 OFF</button>
  <button id="draw-done-btn"    class="draw-btn" onclick="finishDrawing()">그리기 완료</button>
  <button id="draw-cancel-btn"  class="draw-btn" onclick="cancelDrawing()">취소</button>
  <button id="draw-confirm-btn" class="draw-btn" style="display:none" onclick="confirmPolygon()">✓ 확정 저장</button>
  <button id="draw-redo-btn"    class="draw-btn" style="display:none" onclick="redoDrawing()">↺ 다시 그리기</button>
</div>
<div id="draw-count">꼭짓점 0개</div>

<script>
  var KAKAO_REST_KEY = '5c4726e1065951f08c12e1065e078faa';
  var map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(34.85, 128.62),
    level: 5,
    mapTypeId: kakao.maps.MapTypeId.HYBRID
  });
  var marker = null;
  var originForPost = '*';
  var drawingActive = false;
  var editingActive = false;
  var drawMode = 'zone'; // 'yard' | 'zone'
  var gateMode = false;
  var gateMarkerCustom = null; // 정문 핀 (CustomOverlay)
  var yardPolygonGuide = null;
  var yardVerticesGuide = [];
  // ── 뷰 모드 (배경 지도 전용) ──────────────────────────────
  var viewPolygons = []; // 뷰 모드에서 그려진 다각형/라벨 오버레이
  var viewPolyMap  = {}; // {zoneId → {poly, label}} 블링크 접근용
  var viewPin      = null; // 뷰 모드 핀 마커
  var _blinkTimer  = null;
  // ── 뷰 모드 인라인 편집 ────────────────────────────────────
  var _veMode      = null;  // 'zone' | 'yard'
  var _veZoneId    = null;
  var _veMarkers   = [];
  var _vePolyline  = null;
  var _yardBounds  = null;  // 드래그 범위 제한용 야드 bbox {sw, ne}
  var drawVertices = [];
  var drawMarkers = [];   // numbered CustomOverlay dots (draw mode)
  var editMarkers = [];   // draggable Markers (edit mode)
  var drawPolyline = null;
  var drawPolygon  = null;

  // ─── 레이아웃 헬퍼 ───────────────────────────────────────
  function setDrawMode() {
    document.getElementById('hint-draw').style.display  = 'inline';
    document.getElementById('hint-edit').style.display  = 'none';
    document.getElementById('draw-done-btn').style.display    = 'inline-block';
    document.getElementById('draw-cancel-btn').style.display  = 'inline-block';
    document.getElementById('draw-confirm-btn').style.display = 'none';
    document.getElementById('draw-redo-btn').style.display    = 'none';
  }
  function setEditMode() {
    document.getElementById('hint-draw').style.display  = 'none';
    document.getElementById('hint-edit').style.display  = 'inline';
    document.getElementById('draw-done-btn').style.display    = 'none';
    document.getElementById('draw-cancel-btn').style.display  = 'none';
    document.getElementById('draw-confirm-btn').style.display = 'inline-block';
    document.getElementById('draw-redo-btn').style.display    = 'inline-block';
  }

  // ─── 폴리곤 내부 포인트 체크 ─────────────────────────────
  function isPointInPolygon(lat, lng, polygonVertices) {
    if (!polygonVertices || polygonVertices.length < 3) return true;
    var x = lng, y = lat, inside = false;
    for (var i = 0, j = polygonVertices.length - 1; i < polygonVertices.length; j = i++) {
      var xi = polygonVertices[i].lng, yi = polygonVertices[i].lat;
      var xj = polygonVertices[j].lng, yj = polygonVertices[j].lat;
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
  }

  // ─── 정문 모드 ───────────────────────────────────────────
  function startGateMode(existingLat, existingLng) {
    gateMode = true;
    drawingActive = false;
    document.getElementById('gate-toolbar').classList.add('visible');
    if (existingLat && existingLng) placeGateMarker(existingLat, existingLng);
  }
  function cancelGateMode() {
    gateMode = false;
    document.getElementById('gate-toolbar').classList.remove('visible');
    if (gateMarkerCustom) { gateMarkerCustom.setMap(null); gateMarkerCustom = null; }
    notifyParent({ type: 'GATE_MODE_CANCELLED' });
  }
  function confirmGate() {
    if (!gateMarkerCustom) { alert('지도에서 정문 위치를 먼저 클릭하세요.'); return; }
    var pos = gateMarkerCustom._pos;
    gateMode = false;
    document.getElementById('gate-toolbar').classList.remove('visible');
    notifyParent({ type: 'GATE_POSITION_SELECTED', lat: pos.lat, lng: pos.lng });
  }
  function placeGateMarker(lat, lng) {
    if (gateMarkerCustom) gateMarkerCustom.setMap(null);
    gateMarkerCustom = new kakao.maps.CustomOverlay({
      map: map,
      position: new kakao.maps.LatLng(lat, lng),
      yAnchor: 1,
      zIndex: 25,
      content: '<div style="text-align:center;transform:translateY(-4px)">'
        + '<div style="width:32px;height:32px;background:#F59E0B;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 4px 12px rgba(0,0,0,.4)"></div>'
        + '<div style="margin-top:2px;background:#0F172A;color:#FDE047;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:800;white-space:nowrap">🚧 정문</div>'
        + '</div>'
    });
    gateMarkerCustom._pos = { lat: lat, lng: lng };
    map.setCenter(new kakao.maps.LatLng(lat, lng));
  }

  // ─── 드로잉 시작 ─────────────────────────────────────────
  function startDrawMode(mode, yardVertices) {
    drawMode = mode || 'zone';
    drawingActive = true;
    editingActive = false;
    // 그리기 모드: 팬 복원 + 흰색 레이어 숨김 (선명한 위성지도)
    map.setDraggable(true);
    var fader = document.getElementById('map-fader');
    if (fader) fader.style.display = 'none';
    clearDrawing();
    clearEditMarkers();

    if (yardPolygonGuide) { yardPolygonGuide.setMap(null); yardPolygonGuide = null; }
    yardVerticesGuide = yardVertices || [];
    if (drawMode === 'zone' && yardVerticesGuide.length >= 3) {
      var path = yardVerticesGuide.map(function(v) { return new kakao.maps.LatLng(v.lat, v.lng); });
      yardPolygonGuide = new kakao.maps.Polygon({
        map: map, path: path,
        strokeWeight: 4, strokeColor: '#FDE047', strokeOpacity: 1, strokeStyle: 'shortdash',
        fillColor: '#F59E0B', fillOpacity: 0
      });
      map.setCenter(path[0]);
    }

    setDrawMode();
    document.getElementById('draw-toolbar').classList.add('visible');
    document.getElementById('draw-count').classList.add('visible');
    updateDrawCount();
    setTimeout(function() { map.relayout(); }, 80);
  }

  // ─── 그리기 완료 → 편집 모드 진입 ───────────────────────
  function finishDrawing() {
    if (!drawVertices || drawVertices.length < 3) {
      alert('꼭짓점 3개 이상을 클릭해야 저장할 수 있습니다.');
      return;
    }
    enterEditMode();
  }

  function enterEditMode() {
    drawingActive = false;
    editingActive = true;

    // 번호 오버레이 제거
    drawMarkers.forEach(function(m) { m.setMap(null); });
    drawMarkers = [];
    if (drawPolyline) { drawPolyline.setMap(null); drawPolyline = null; }
    if (drawPolygon)  { drawPolygon.setMap(null);  drawPolygon  = null; }

    // 드래그 가능한 마커 생성
    editMarkers = drawVertices.map(function(v, idx) {
      var pos = new kakao.maps.LatLng(v.lat, v.lng);
      var m = new kakao.maps.Marker({
        position: pos,
        map: map,
        draggable: true,
        zIndex: 5,
        title: (idx + 1) + '번 꼭짓점'
      });
      kakao.maps.event.addListener(m, 'drag', redrawEditPolygon);
      return m;
    });

    redrawEditPolygon();
    setEditMode();
    document.getElementById('draw-count').textContent =
      '꼭짓점 ' + editMarkers.length + '개 — 드래그하여 조정';
  }

  function redrawEditPolygon() {
    var path = editMarkers.map(function(m) { return m.getPosition(); });
    if (drawPolygon) { drawPolygon.setMap(null); drawPolygon = null; }
    if (path.length >= 3) {
      drawPolygon = new kakao.maps.Polygon({
        map: map, path: path,
        strokeWeight: 2, strokeColor: '#F59E0B', strokeOpacity: 1,
        fillColor: '#F59E0B', fillOpacity: .36
      });
    }
  }

  // ─── 확정 저장 ───────────────────────────────────────────
  function confirmPolygon() {
    var vertices = editMarkers.map(function(m, idx) {
      var p = m.getPosition();
      return { seq: idx + 1, lat: p.getLat(), lng: p.getLng() };
    });
    if (vertices.length < 3) { alert('꼭짓점이 부족합니다.'); return; }
    if (drawMode === 'zone' && yardVerticesGuide.length >= 3) {
      var allInside = vertices.every(function(v) {
        return isPointInPolygon(v.lat, v.lng, yardVerticesGuide);
      });
      if (!allInside) {
        alert('세부구역은 적치장 경계 안쪽에만 저장할 수 있습니다. 밖으로 나간 점을 안쪽으로 옮겨주세요.');
        return;
      }
    }
    var type = (drawMode === 'yard') ? 'KAKAO_YARD_DRAW_END' : 'KAKAO_ZONE_DRAW_END';
    notifyParent({ type: type, data: vertices });
    cancelDrawing();
  }

  // ─── 다시 그리기 ─────────────────────────────────────────
  function redoDrawing() {
    clearEditMarkers();
    if (drawPolygon) { drawPolygon.setMap(null); drawPolygon = null; }
    editingActive = false;
    drawingActive = true;
    drawVertices = [];
    setDrawMode();
    updateDrawCount();
  }

  // ─── 취소 (전체 초기화) ───────────────────────────────────
  function cancelDrawing() {
    drawingActive = false;
    editingActive = false;
    clearEditMarkers();
    clearDrawing();
    if (yardPolygonGuide) { yardPolygonGuide.setMap(null); yardPolygonGuide = null; }
    yardVerticesGuide = [];
    setDrawMode();
    document.getElementById('draw-toolbar').classList.remove('visible');
    document.getElementById('draw-count').classList.remove('visible');
  }

  // ─── 편집 마커 제거 ──────────────────────────────────────
  function clearEditMarkers() {
    editMarkers.forEach(function(m) { m.setMap(null); });
    editMarkers = [];
  }

  // ─── 드로잉 상태 초기화 ──────────────────────────────────
  function clearDrawing() {
    drawVertices = [];
    drawMarkers.forEach(function(m) { m.setMap(null); });
    drawMarkers = [];
    if (drawPolyline) { drawPolyline.setMap(null); drawPolyline = null; }
    if (drawPolygon)  { drawPolygon.setMap(null);  drawPolygon  = null; }
    hidePreviewAll();
    updateDrawCount();
  }

  // ─── 꼭짓점 추가 (드로잉 모드) ───────────────────────────
  function addDrawVertex(latlng) {
    var seq = drawVertices.length + 1;
    drawVertices.push({ seq: seq, lat: latlng.getLat(), lng: latlng.getLng() });
    var dot = new kakao.maps.CustomOverlay({
      position: latlng, yAnchor: .5, xAnchor: .5,
      content: '<div style="width:20px;height:20px;border-radius:999px;background:#F59E0B;border:2px solid #fff;color:#111827;font-size:10px;font-weight:900;line-height:16px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.3)">' + seq + '</div>'
    });
    dot.setMap(map);
    drawMarkers.push(dot);
    redrawShape();
    updateDrawCount();
  }

  function redrawShape() {
    var path = drawVertices.map(function(v) { return new kakao.maps.LatLng(v.lat, v.lng); });
    if (drawPolyline) drawPolyline.setMap(null);
    if (drawPolygon)  drawPolygon.setMap(null);
    if (path.length >= 2) {
      drawPolyline = new kakao.maps.Polyline({
        map: map, path: path,
        strokeWeight: 2, strokeColor: '#F59E0B', strokeOpacity: 1, strokeStyle: 'solid'
      });
    }
    if (path.length >= 3) {
      drawPolygon = new kakao.maps.Polygon({
        map: map, path: path,
        strokeWeight: 2, strokeColor: '#F59E0B', strokeOpacity: 1,
        fillColor: '#F59E0B', fillOpacity: .18
      });
    }
  }

  function updateDrawCount() {
    var box = document.getElementById('draw-count');
    if (box) box.textContent = '꼭짓점 ' + drawVertices.length + '개';
  }

  // ══ 그리기 스냅(인접 영역) + 직각 보정 ═══════════════════════
  var orthoMode = false;         // 직각 보정 (토글, 기본 OFF — 자동 아님)
  var viewZoneRings = [];        // 기존 구역/야드 링 [{lat,lng},...]
  var buildingRings = [];        // 기존 건물 링 (스냅 대상)
  var snapPreview = null;        // 스냅 지점 초록 미리보기
  var previewLine = null;        // 직전 꼭짓점→커서 미리보기 선
  var alignBadge  = null;        // 직선/직각 정렬 배지
  var SNAP_PX = 14;              // 스냅 임계(픽셀)
  var ANGLE_TOL = 6;             // 직선/직각 소프트스냅 허용 각도(도)

  function _projPt(ll) { try { return map.getProjection().pointFromCoords(ll); } catch (e) { return null; } }
  function _projLL(x, y) { try { return map.getProjection().coordsFromPoint(new kakao.maps.Point(x, y)); } catch (e) { return null; } }

  function _snapRings() {
    var rings = viewZoneRings.slice();
    buildingRings.forEach(function (r) { rings.push(r); }); // 건물도 스냅 대상
    if (yardVerticesGuide && yardVerticesGuide.length >= 3) {
      rings.push(yardVerticesGuide.map(function (v) { return { lat: +v.lat, lng: +v.lng }; }));
    }
    return rings;
  }

  // 기존 구역/야드의 꼭짓점·변에 스냅 (픽셀 임계 이내)
  function snapToExisting(latlng) {
    var cp = _projPt(latlng);
    if (!cp) return { latlng: latlng, snapped: false };
    var rings = _snapRings();
    var best = null, bestD = SNAP_PX;
    // 1) 꼭짓점 우선
    rings.forEach(function (ring) {
      ring.forEach(function (v) {
        var p = _projPt(new kakao.maps.LatLng(v.lat, v.lng)); if (!p) return;
        var d = Math.sqrt((p.x - cp.x) * (p.x - cp.x) + (p.y - cp.y) * (p.y - cp.y));
        if (d < bestD) { bestD = d; best = new kakao.maps.LatLng(v.lat, v.lng); }
      });
    });
    if (best) return { latlng: best, snapped: true };
    // 2) 변(edge)에 투영
    var bestE = null, bestED = SNAP_PX;
    rings.forEach(function (ring) {
      for (var i = 0; i < ring.length; i++) {
        var a = ring[i], b = ring[(i + 1) % ring.length];
        var pa = _projPt(new kakao.maps.LatLng(a.lat, a.lng)), pb = _projPt(new kakao.maps.LatLng(b.lat, b.lng));
        if (!pa || !pb) continue;
        var dx = pb.x - pa.x, dy = pb.y - pa.y, len2 = dx * dx + dy * dy;
        var t = len2 ? ((cp.x - pa.x) * dx + (cp.y - pa.y) * dy) / len2 : -1;
        if (t < 0 || t > 1) continue;
        var qx = pa.x + t * dx, qy = pa.y + t * dy;
        var d = Math.sqrt((qx - cp.x) * (qx - cp.x) + (qy - cp.y) * (qy - cp.y));
        if (d < bestED) { bestED = d; bestE = { x: qx, y: qy }; }
      }
    });
    if (bestE) { var ll = _projLL(bestE.x, bestE.y); if (ll) return { latlng: ll, snapped: true }; }
    return { latlng: latlng, snapped: false };
  }

  // 직각 보정: 직전 변에 대해 평행/수직 (점 2개 이상 필요)
  function applyOrtho(latlng) {
    if (!orthoMode || drawVertices.length < 2) return latlng;
    var n = drawVertices.length, a = drawVertices[n - 2], b = drawVertices[n - 1];
    var pa = _projPt(new kakao.maps.LatLng(a.lat, a.lng)), pb = _projPt(new kakao.maps.LatLng(b.lat, b.lng)), pc = _projPt(latlng);
    if (!pa || !pb || !pc) return latlng;
    var dx = pb.x - pa.x, dy = pb.y - pa.y, L = Math.sqrt(dx * dx + dy * dy) || 1;
    var ux = dx / L, uy = dy / L, px = -uy, py = ux;
    var vx = pc.x - pb.x, vy = pc.y - pb.y;
    var along = vx * ux + vy * uy, perp = vx * px + vy * py, nx, ny;
    if (Math.abs(along) >= Math.abs(perp)) { nx = pb.x + ux * along; ny = pb.y + uy * along; }
    else { nx = pb.x + px * perp; ny = pb.y + py * perp; }
    var ll = _projLL(nx, ny); return ll || latlng;
  }

  // 직선/직각 소프트스냅: 직전 변 기준 0/90° 또는 수평/수직에 가까우면(ANGLE_TOL 이내) 반듯하게 보정
  function straightGuide(latlng) {
    if (drawVertices.length < 1) return { latlng: latlng, aligned: false };
    var n = drawVertices.length, last = drawVertices[n - 1];
    var pl = _projPt(new kakao.maps.LatLng(last.lat, last.lng)), pc = _projPt(latlng);
    if (!pl || !pc) return { latlng: latlng, aligned: false };
    var vx = pc.x - pl.x, vy = pc.y - pl.y, len = Math.sqrt(vx * vx + vy * vy);
    if (len < 2) return { latlng: latlng, aligned: false };
    var cands = [];
    if (n >= 2) { // 직전 변 방향 기준 평행/수직
      var a = drawVertices[n - 2], pa = _projPt(new kakao.maps.LatLng(a.lat, a.lng));
      if (pa) {
        var dx = pl.x - pa.x, dy = pl.y - pa.y, L = Math.sqrt(dx * dx + dy * dy) || 1, ux = dx / L, uy = dy / L;
        cands.push({ x: ux, y: uy, kind: 'ortho' }, { x: -uy, y: ux, kind: 'ortho' }, { x: -ux, y: -uy, kind: 'ortho' }, { x: uy, y: -ux, kind: 'ortho' });
      }
    }
    cands.push({ x: 1, y: 0, kind: 'hv' }, { x: 0, y: 1, kind: 'hv' }, { x: -1, y: 0, kind: 'hv' }, { x: 0, y: -1, kind: 'hv' }); // 수평/수직(E-W/N-S)
    var best = null, bestAng = ANGLE_TOL * Math.PI / 180, cxu = vx / len, cyu = vy / len;
    cands.forEach(function (c) {
      var dot = Math.max(-1, Math.min(1, cxu * c.x + cyu * c.y));
      var ang = Math.acos(dot);
      if (ang < bestAng) { bestAng = ang; best = c; }
    });
    if (!best) return { latlng: latlng, aligned: false };
    var along = vx * best.x + vy * best.y;
    var ll = _projLL(pl.x + best.x * along, pl.y + best.y * along);
    return { latlng: ll || latlng, aligned: true, kind: best.kind };
  }

  // 스냅(인접) 우선 → 직각토글 ON이면 강제 직각 → 아니면 직선/직각 소프트스냅
  function computeDrawPoint(latlng) {
    var s = snapToExisting(latlng);
    if (s.snapped) return { latlng: s.latlng, snapped: true, aligned: false };
    if (orthoMode) return { latlng: applyOrtho(latlng), snapped: false, aligned: true, kind: 'ortho' };
    var g = straightGuide(latlng);
    return { latlng: g.latlng, snapped: false, aligned: g.aligned, kind: g.kind };
  }

  function showSnapPreview(latlng, snapped) {
    if (!snapPreview) snapPreview = new kakao.maps.CustomOverlay({ position: latlng, yAnchor: .5, xAnchor: .5, zIndex: 65 });
    snapPreview.setContent('<div style="width:16px;height:16px;border-radius:50%;background:' + (snapped ? '#22C55E' : 'rgba(34,197,94,.35)') + ';border:2px solid #fff;box-shadow:0 0 0 2px ' + (snapped ? '#15803D' : 'rgba(34,197,94,.5)') + '"></div>');
    snapPreview.setPosition(latlng);
    snapPreview.setMap(map);
  }

  // 미리보기: 스냅 점 + 직전 꼭짓점→커서 선 + 직선/직각 배지
  function showPreview(cp) {
    var aligned = cp.aligned || cp.snapped;
    showSnapPreview(cp.latlng, cp.snapped);
    if (drawVertices.length >= 1) {
      var lv = drawVertices[drawVertices.length - 1];
      var path = [new kakao.maps.LatLng(lv.lat, lv.lng), cp.latlng];
      if (previewLine) previewLine.setMap(null);
      previewLine = new kakao.maps.Polyline({
        map: map, path: path, strokeWeight: 2, strokeOpacity: .95,
        strokeColor: aligned ? '#22C55E' : '#F59E0B', strokeStyle: aligned ? 'solid' : 'shortdash'
      });
      if (cp.aligned) {
        if (!alignBadge) alignBadge = new kakao.maps.CustomOverlay({ position: cp.latlng, yAnchor: 1.8, xAnchor: .5, zIndex: 66 });
        alignBadge.setContent('<div style="background:#15803D;color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.35)">' + (cp.kind === 'hv' ? '─ 직선' : '⊾ 직각') + '</div>');
        alignBadge.setPosition(cp.latlng); alignBadge.setMap(map);
      } else if (alignBadge) { alignBadge.setMap(null); }
    } else {
      if (previewLine) previewLine.setMap(null);
      if (alignBadge) alignBadge.setMap(null);
    }
  }
  function hideSnapPreview() { if (snapPreview) snapPreview.setMap(null); }
  function hidePreviewAll() { hideSnapPreview(); if (previewLine) previewLine.setMap(null); if (alignBadge) alignBadge.setMap(null); }

  function toggleOrtho() {
    orthoMode = !orthoMode;
    var btn = document.getElementById('draw-ortho-btn');
    if (btn) { btn.textContent = orthoMode ? '⊾ 직각 ON' : '⊾ 직각 OFF'; btn.style.background = orthoMode ? '#7C3AED' : '#475569'; }
  }

  function notifyParent(data) {
    window.parent.postMessage(data, originForPost || '*');
  }

  // ─── 부모 메시지 수신 ─────────────────────────────────────
  // ─── 뷰 모드 — 구역 폴리곤 그리기 (점선, 채우기 없음) ────
  function renderViewZones(zones) {
    viewPolygons.forEach(function(o) { o.setMap(null); });
    viewPolygons = [];
    viewPolyMap  = {};
    // 그리기 스냅용 기존 구역/야드 링 저장
    viewZoneRings = (zones || []).filter(function(z){ return z.vertices && z.vertices.length >= 2; })
      .map(function(z){ return z.vertices.map(function(v){ return { lat: +v.lat, lng: +v.lng }; }); });
    if (_blinkTimer) { clearInterval(_blinkTimer); _blinkTimer = null; }
    // 뷰 모드: 드래그 이동 + 스크롤 줌 모두 허용
    map.setDraggable(true);
    map.setZoomable(true);
    // 위성지도 타일만 연하게: 타일 레이어(z-index≈100) 위, 폴리곤 오버레이(z-index≈200) 아래에 흰색 레이어 삽입
    var fader = document.getElementById('map-fader');
    if (!fader) {
      fader = document.createElement('div');
      fader.id = 'map-fader';
      fader.style.cssText = 'position:absolute;inset:0;background:rgba(255,255,255,0.18);z-index:150;pointer-events:none;';
      document.getElementById('map').appendChild(fader);
    }
    fader.style.display = 'block';
    // 적치장명 오버레이 업데이트
    var yardZone = (zones || []).find(function(z) { return z && z.isYard; });
    var yardNameEl = document.getElementById('yard-name-overlay');
    var yardNameText = document.getElementById('yard-name-text');
    if (yardZone && yardZone.zoneName && yardNameEl && yardNameText) {
      yardNameText.textContent = yardZone.zoneName;
      yardNameEl.classList.add('visible');
    } else if (yardNameEl) {
      yardNameEl.classList.remove('visible');
    }
    if (!zones || !zones.length) return;
    var yardGuide = null;
    zones.forEach(function(z) {
      if (z && z.isYard && z.vertices && z.vertices.length >= 3) yardGuide = z.vertices;
    });
    var bounds = new kakao.maps.LatLngBounds();
    var zoneBounds = new kakao.maps.LatLngBounds();
    var hasZones = false;
    zones.forEach(function(zone) {
      if (!zone.vertices || zone.vertices.length < 3) return;
      if (!zone.isYard && yardGuide && yardGuide.length >= 3) {
        var allInside = zone.vertices.every(function(v) {
          return isPointInPolygon(Number(v.lat), Number(v.lng), yardGuide);
        });
        if (!allInside) return;
      }
      var path = zone.vertices.map(function(v) {
        var latlng = new kakao.maps.LatLng(v.lat, v.lng);
        bounds.extend(latlng);
        if (!zone.isYard) { zoneBounds.extend(latlng); hasZones = true; }
        return latlng;
      });
      var color = zone.color || '#3B82F6';
      if (zone.isYard) {
        // 전체 적치장 경계 — 회색 점선, 클릭 불가
        var yardPoly = new kakao.maps.Polygon({
          map: map,
          path: path,
          strokeWeight: 4,
          strokeColor: '#FDE047',
          strokeOpacity: 1,
          strokeStyle: 'shortdash',
          fillColor: '#F59E0B',
          fillOpacity: 0
        });
        viewPolygons.push(yardPoly);
        return;
      }
      // 세부 구역 — 두꺼운 실선 폴리곤으로 선명하게 표시
      var poly = new kakao.maps.Polygon({
        map: map,
        path: path,
        strokeWeight: 5,
        strokeColor: color,
        strokeOpacity: 1,
        strokeStyle: 'solid',
        fillColor: color,
        fillOpacity: 0.25,
        zIndex: 10
      });
      kakao.maps.event.addListener(poly, 'click', function() {
        window.parent.postMessage({ type: 'VIEW_ZONE_CLICK', zoneId: zone.zoneId }, originForPost);
      });
      viewPolygons.push(poly);
      viewPolyMap[zone.zoneId] = { poly: poly, label: null };
      // 구역 라벨
      var cLat = 0, cLng = 0;
      zone.vertices.forEach(function(v) { cLat += v.lat; cLng += v.lng; });
      cLat /= zone.vertices.length; cLng /= zone.vertices.length;
      var label = new kakao.maps.CustomOverlay({
        map: map,
        position: new kakao.maps.LatLng(cLat, cLng),
        content: '<div style="background:' + color + ';padding:3px 9px;border-radius:5px;'
          + 'font-size:12px;font-weight:800;color:#fff;white-space:nowrap;'
          + 'box-shadow:0 2px 6px rgba(0,0,0,.25);pointer-events:none">' + (zone.zoneName || zone.zoneId) + '</div>',
        zIndex: 4
      });
      viewPolyMap[zone.zoneId].label = label;
      viewPolygons.push(label);
    });
    // 야드 바운드 저장 (드래그 범위 제한용) — 야드 꼭짓점 기준으로 확장 bbox 계산
    if (yardGuide && yardGuide.length >= 3) {
      var minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
      yardGuide.forEach(function(v) {
        if (v.lat < minLat) minLat = v.lat; if (v.lat > maxLat) maxLat = v.lat;
        if (v.lng < minLng) minLng = v.lng; if (v.lng > maxLng) maxLng = v.lng;
      });
      var pad = Math.max(maxLat - minLat, maxLng - minLng) * 1.2;
      _yardBounds = {
        minLat: minLat - pad, maxLat: maxLat + pad,
        minLng: minLng - pad, maxLng: maxLng + pad
      };
    } else {
      _yardBounds = null;
    }
    try {
      map.setBounds(bounds, 40);
    } catch(e) {}
  }

  var buildingPolys = [];
  function renderBuildings(buildings) {
    buildingPolys.forEach(function(o){ try{ o.setMap(null); }catch(e){} });
    buildingPolys = [];
    buildingRings = (buildings || []).filter(function(b){ return b.vertices && b.vertices.length >= 2; })
      .map(function(b){ return b.vertices.map(function(v){ return { lat: +v.lat, lng: +v.lng }; }); });
    (buildings || []).forEach(function(b){
      if (!b.vertices || b.vertices.length < 3) return;
      var path = b.vertices.map(function(v){ return new kakao.maps.LatLng(Number(v.lat), Number(v.lng)); });
      var poly = new kakao.maps.Polygon({
        map: map, path: path, strokeWeight: 3, strokeColor: '#94A3B8',
        strokeOpacity: 0.9, strokeStyle: 'shortdash', fillColor: '#64748B', fillOpacity: 0.25, zIndex: 2
      });
      buildingPolys.push(poly);
    });
  }

  // ── 뷰맵 구역 꼭짓점 인라인 편집 ────────────────────────────
  // ── 야드 경계 꼭짓점 인라인 편집 (뷰맵) ─────────────────────
  function startYardEdit(vertices) {
    cancelViewZoneEdit(false);
    _veMode   = 'yard';
    _veZoneId = '__yard__';
    vertices.forEach(function(v, i) {
      var m = new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(Number(v.lat), Number(v.lng)),
        draggable: true, zIndex: 50,
        title: (i + 1) + '번 꼭짓점'
      });
      kakao.maps.event.addListener(m, 'drag', _updateVePolyline);
      _veMarkers.push(m);
    });
    _updateVePolyline();
    notifyParent({ type: 'YARD_EDIT_STARTED' });
  }

  function startViewZoneEdit(zoneId, vertices) {
    cancelViewZoneEdit(false);
    _veMode   = 'zone';
    _veZoneId = zoneId;
    var entry = viewPolyMap[zoneId];
    if (entry) {
      if (entry.poly) entry.poly.setMap(null);
      if (entry.label) entry.label.setMap(null);
    }
    vertices.forEach(function(v) {
      var m = new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(Number(v.lat), Number(v.lng)),
        draggable: true,
        zIndex: 50
      });
      kakao.maps.event.addListener(m, 'drag', _updateVePolyline);
      _veMarkers.push(m);
    });
    _updateVePolyline();
  }

  function _updateVePolyline() {
    var path = _veMarkers.map(function(m) { return m.getPosition(); });
    if (path.length >= 2) path.push(path[0]);
    if (_vePolyline) _vePolyline.setMap(null);
    _vePolyline = new kakao.maps.Polyline({
      map: map, path: path,
      strokeWeight: 3, strokeColor: '#F59E0B', strokeOpacity: 1, strokeStyle: 'shortdash'
    });
  }

  function confirmViewZoneEdit() {
    if (!_veZoneId || _veMarkers.length < 3) return;
    var vertices = _veMarkers.map(function(m, i) {
      var p = m.getPosition();
      return { seq: i + 1, lat: p.getLat(), lng: p.getLng() };
    });
    if (_veMode === 'yard') {
      notifyParent({ type: 'KAKAO_YARD_EDIT_END', data: vertices });
    } else {
      notifyParent({ type: 'KAKAO_ZONE_EDIT_END', zoneId: _veZoneId, data: vertices });
    }
    cancelViewZoneEdit(false);
  }

  function cancelViewZoneEdit(restore) {
    _veMarkers.forEach(function(m) { m.setMap(null); });
    _veMarkers = [];
    if (_vePolyline) { _vePolyline.setMap(null); _vePolyline = null; }
    if (restore !== false && _veMode === 'zone' && _veZoneId) {
      var entry = viewPolyMap[_veZoneId];
      if (entry) {
        if (entry.poly) entry.poly.setMap(map);
        if (entry.label) entry.label.setMap(map);
      }
    }
    _veZoneId = null;
    _veMode   = null;
  }

  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || !d.type) return;
    originForPost = e.origin || '*';
    if (d.type === 'startGateMode') {
      startGateMode(d.lat, d.lng);
    } else if (d.type === 'cancelGateMode') {
      cancelGateMode();
    } else if (d.type === 'showGateMarker') {
      placeGateMarker(d.lat, d.lng);
    } else if (d.type === 'startKakaoDrawing' || d.type === 'enterDrawMode') {
      startDrawMode(d.mode, d.yardVertices);
    } else if (d.type === 'exitDrawMode') {
      cancelDrawing();
    } else if (d.type === 'moveTo') {
      var pos = new kakao.maps.LatLng(d.lat, d.lng);
      map.setCenter(pos);
      if (d.placeMarker) placeMarker(d.lat, d.lng);
      setTimeout(function() { map.relayout(); }, 40);
    } else if (d.type === 'renderViewZones') {
      renderViewZones(d.zones || []);
    } else if (d.type === 'renderBuildings') {
      renderBuildings(d.buildings || []);
    } else if (d.type === 'viewCenter') {
      if (d.bbox) {
        var sw = new kakao.maps.LatLng(d.bbox.minLat, d.bbox.minLng);
        var ne = new kakao.maps.LatLng(d.bbox.maxLat, d.bbox.maxLng);
        var _bounds = new kakao.maps.LatLngBounds(sw, ne);
        map.relayout();
        map.setBounds(_bounds, 10, 10, 10, 10);
        setTimeout(function() { map.relayout(); map.setBounds(_bounds, 10, 10, 10, 10); }, 150);
      } else if (d.lat && d.lng) {
        map.setCenter(new kakao.maps.LatLng(d.lat, d.lng));
        if (d.level) map.setLevel(d.level);
      }
    } else if (d.type === 'showViewPin') {
      if (viewPin) { viewPin.setMap(null); viewPin = null; }
      var pinPos = new kakao.maps.LatLng(d.lat, d.lng);
      viewPin = new kakao.maps.CustomOverlay({
        map: map,
        position: pinPos,
        yAnchor: 1,
        zIndex: 30,
        content: '<div style="position:relative;width:30px;height:42px;transform:translateY(-2px);animation:view-pin-bounce 1.15s cubic-bezier(.4,0,.2,1) infinite">'
          + '<div style="position:absolute;left:50%;top:0;width:24px;height:24px;margin-left:-12px;background:#EF4444;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 5px 12px rgba(127,29,29,.42),0 0 14px rgba(239,68,68,.6)"></div>'
          + '<div style="position:absolute;left:50%;top:7px;width:8px;height:8px;margin-left:-4px;background:#fff;border-radius:50%;z-index:2"></div>'
          + '<div style="position:absolute;left:50%;bottom:0;width:24px;height:7px;margin-left:-12px;background:rgba(127,29,29,.26);border-radius:50%;filter:blur(.5px)"></div>'
          + '</div>'
      });
      map.setCenter(pinPos);
    } else if (d.type === 'clearViewPin') {
      if (viewPin) { viewPin.setMap(null); viewPin = null; }
    } else if (d.type === 'editYardVertices') {
      startYardEdit(d.vertices || []);
    } else if (d.type === 'editViewZone') {
      startViewZoneEdit(d.zoneId, d.vertices || []);
    } else if (d.type === 'confirmViewZoneEdit') {
      confirmViewZoneEdit();
    } else if (d.type === 'cancelViewZoneEdit') {
      cancelViewZoneEdit(true);
    } else if (d.type === 'blinkZone') {
      if (_blinkTimer) { clearInterval(_blinkTimer); _blinkTimer = null; }
      var entry = viewPolyMap[d.zoneId];
      if (!entry || !entry.poly) return;
      var bPoly = entry.poly;
      var bCount = 0;
      _blinkTimer = setInterval(function() {
        bCount++;
        try { bPoly.setOptions({ fillOpacity: bCount % 2 === 0 ? 0.42 : 0.84 }); } catch(e) {}
        if (bCount >= 12) {
          clearInterval(_blinkTimer); _blinkTimer = null;
          try { bPoly.setOptions({ fillOpacity: 0.42 }); } catch(e) {}
        }
      }, 250);
    }
  });

  // ─── 지도 클릭 ───────────────────────────────────────────
  kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
    var latlng = mouseEvent.latLng;

    if (editingActive) return;

    // 정문 위치 지정 모드
    if (gateMode) {
      placeGateMarker(latlng.getLat(), latlng.getLng());
      return;
    }

    if (drawingActive) {
      var snap = computeDrawPoint(latlng);
      var sll = snap.latlng;
      var lat = sll.getLat(), lng = sll.getLng();
      if (drawMode === 'zone' && yardVerticesGuide.length >= 3) {
        if (!isPointInPolygon(lat, lng, yardVerticesGuide)) {
          alert('꼭짓점은 전체 적치장(Yard) 영역 내부에만 지정할 수 있습니다.');
          return;
        }
      }
      addDrawVertex(sll);
      return;
    }

    // 일반 모드 — 위치 마커
    var lat = latlng.getLat(), lng = latlng.getLng();
    placeMarker(lat, lng);
    reverseGeocode(lat, lng);
    notifyParent({ type: 'coords', lat: lat, lng: lng });
  });

  // ── 그리기 중 스냅 지점 미리보기 ──────────────────────────
  kakao.maps.event.addListener(map, 'mousemove', function(me) {
    if (!drawingActive) { hidePreviewAll(); return; }
    var cp = computeDrawPoint(me.latLng);
    showPreview(cp);
  });

  // ── 드래그 범위 제한 (야드 bbox 2x 패딩 초과 시 복귀) ───────
  kakao.maps.event.addListener(map, 'dragend', function() {
    if (!_yardBounds) return;
    var c = map.getCenter();
    var lat = c.getLat(), lng = c.getLng();
    var clampLat = Math.min(Math.max(lat, _yardBounds.minLat), _yardBounds.maxLat);
    var clampLng = Math.min(Math.max(lng, _yardBounds.minLng), _yardBounds.maxLng);
    if (clampLat !== lat || clampLng !== lng) {
      map.panTo(new kakao.maps.LatLng(clampLat, clampLng));
    }
  });

  function placeMarker(lat, lng) {
    var pos = new kakao.maps.LatLng(lat, lng);
    if (marker) {
      marker.setPosition(pos);
    } else {
      marker = new kakao.maps.Marker({ position: pos, map: map, draggable: true });
      kakao.maps.event.addListener(marker, 'drag', function() {
        var p = marker.getPosition();
        notifyParent({ type: 'coords', lat: p.getLat(), lng: p.getLng() });
      });
      kakao.maps.event.addListener(marker, 'dragend', function() {
        var p = marker.getPosition();
        reverseGeocode(p.getLat(), p.getLng());
        notifyParent({ type: 'coords', lat: p.getLat(), lng: p.getLng() });
      });
    }
  }

  function reverseGeocode(lat, lng) {
    fetch('https://dapi.kakao.com/v2/local/geo/coord2address.json?x=' + lng + '&y=' + lat, {
      headers: { Authorization: 'KakaoAK ' + KAKAO_REST_KEY }
    }).then(function(r) { return r.json(); })
      .then(function(data) {
        var doc = data.documents && data.documents[0];
        var addr = doc ? ((doc.road_address && doc.road_address.address_name) || (doc.address && doc.address.address_name) || '') : '';
        if (addr) notifyParent({ type: 'address', address: addr, lat: lat, lng: lng });
      }).catch(function() {});
  }
</script>
</body>
