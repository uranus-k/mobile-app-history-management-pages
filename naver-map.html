<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kakao Map</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#1E293B}
  #map{position:absolute;top:0;left:0;width:100%;height:100%}
  #overlay{position:absolute;top:0;left:0;z-index:10;pointer-events:none;width:100%;height:100%}
  #draw-canvas{position:fixed;top:0;left:0;z-index:200;display:none;pointer-events:none;cursor:crosshair}
  #draw-banner{position:fixed;top:0;left:0;right:0;z-index:201;background:rgba(220,38,38,.85);color:#fff;
               font-size:13px;font-weight:700;text-align:center;padding:6px;display:none;
               font-family:'Malgun Gothic',sans-serif;letter-spacing:.5px}
  #dbg{position:fixed;top:8px;left:8px;z-index:999;background:rgba(0,0,0,.75);color:#fff;
       font-size:11px;font-family:monospace;padding:6px 10px;border-radius:6px;
       pointer-events:none;max-width:280px;line-height:1.6}
  #search-bar{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    z-index:500;display:flex;gap:6px;width:calc(100% - 24px);max-width:480px
  }
  #search-input{
    flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:13px;
    font-family:'Malgun Gothic',sans-serif;outline:none;
    box-shadow:0 2px 8px rgba(0,0,0,.4)
  }
  #search-btn{
    padding:8px 14px;background:#1D4ED8;color:#fff;border:none;border-radius:8px;
    font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
    font-family:'Malgun Gothic',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.4)
  }
  #search-btn:hover{background:#1E40AF}
  #search-results{
    position:fixed;bottom:52px;left:50%;transform:translateX(-50%);
    z-index:501;background:#fff;border-radius:8px;width:calc(100% - 24px);max-width:480px;
    box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;max-height:200px;overflow-y:auto
  }
  .sr-item{padding:9px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:12px;
           font-family:'Malgun Gothic',sans-serif;color:#1e293b;line-height:1.4}
  .sr-item:last-child{border-bottom:none}
  .sr-item:hover{background:#EFF6FF;color:#1D4ED8}
  .sr-name{font-weight:700}
  .sr-addr{color:#64748b;font-size:11px;margin-top:2px}
</style>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f95e6bfd50bbf2a72472a4248d6582a9&libraries=services"></script>
</head>
<body>
<div id="dbg">① 카카오맵 로딩 중...</div>
<div id="map"></div>
<div id="overlay"></div>
<canvas id="draw-canvas"></canvas>

<div id="draw-banner">✦ 드래그하여 구역을 표시하세요 — 클릭하면 취소</div>
<div id="search-results"></div>
<div id="search-bar">
  <input id="search-input" type="text" placeholder="주소 또는 장소 검색 (예: 부산 강서구 녹산산단)" />
  <button id="search-btn" onclick="doSearch()">검색</button>
</div>

<script>
var ZONE_COLORS = ['#EF4444','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F97316'];
var map, zones = [], activeZoneId = null, drawMode = false;
var ps, geocoder;
var _parentPinged = false;

// ── 폴리곤 드로잉 상태 ───────────────────────────────
var polyPts    = [];   // 클릭으로 쌓인 꼭짓점 [{x%,y%}, ...]
var previewPt  = null; // 마우스 현재 위치 (미확정 꼭짓점)
var CLOSE_DIST = 18;   // 첫 꼭짓점 근접 판정 (px)

function setDbg(msg) {
  var el = document.getElementById('dbg');
  if (el) el.textContent = msg;
}

function sizeContainers() {
  var w = window.innerWidth, h = window.innerHeight;
  ['map','overlay','draw-canvas'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
  });
  var c = document.getElementById('draw-canvas');
  if (c) { c.width = w; c.height = h; }
}

function initMap() {
  sizeContainers();
  setDbg('② 지도 초기화 중...');
  try {
    var container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
      center:    new kakao.maps.LatLng(35.1048, 129.0355),
      level:     4,
      mapTypeId: kakao.maps.MapTypeId.HYBRID
    });
    ps       = new kakao.maps.services.Places();
    geocoder = new kakao.maps.services.Geocoder();

    setDbg('✓ 카카오맵 로드 완료');
    window.addEventListener('resize', function() {
      sizeContainers();
      if (map) map.relayout();
    });

    // 검색창 Enter 키
    document.getElementById('search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    postUp({ type: 'mapReady' });
    _parentPinged = false;
    setDbg('✓ mapReady 전송 완료');
    setTimeout(function() {
      var el = document.getElementById('dbg');
      if (el) el.style.display = 'none';
    }, 3000);
  } catch(e) {
    setDbg('✗ 오류: ' + e.message);
  }
}

// ── 주소 검색 ─────────────────────────────────────────
function doSearch() {
  var q = (document.getElementById('search-input').value || '').trim();
  if (!q) return;
  var resEl = document.getElementById('search-results');
  resEl.innerHTML = '<div class="sr-item">검색 중...</div>';
  resEl.style.display = 'block';

  ps.keywordSearch(q, function(data, status) {
    if (status === kakao.maps.services.Status.OK && data.length) {
      showResults(data.map(function(d) {
        return { name: d.place_name, addr: d.road_address_name || d.address_name, lat: +d.y, lng: +d.x };
      }));
    } else {
      // 장소 검색 실패 시 주소 검색 시도
      geocoder.addressSearch(q, function(result, st) {
        if (st === kakao.maps.services.Status.OK && result.length) {
          showResults(result.map(function(r) {
            return { name: r.address_name, addr: '', lat: +r.y, lng: +r.x };
          }));
        } else {
          resEl.innerHTML = '<div class="sr-item">검색 결과 없음</div>';
        }
      });
    }
  });
}

function showResults(list) {
  var resEl = document.getElementById('search-results');
  resEl.innerHTML = '';
  list.slice(0, 8).forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'sr-item';
    div.innerHTML = '<div class="sr-name">' + item.name + '</div>'
      + (item.addr ? '<div class="sr-addr">' + item.addr + '</div>' : '');
    div.onclick = function() {
      map.setCenter(new kakao.maps.LatLng(item.lat, item.lng));
      map.setLevel(3);
      resEl.style.display = 'none';
      document.getElementById('search-input').value = item.name;
    };
    resEl.appendChild(div);
  });
  resEl.style.display = 'block';
}

// 검색 결과 바깥 클릭 시 닫기
document.addEventListener('click', function(e) {
  var resEl = document.getElementById('search-results');
  var bar   = document.getElementById('search-bar');
  if (!bar.contains(e.target) && !resEl.contains(e.target)) {
    resEl.style.display = 'none';
  }
});

function postUp(msg) {
  try { window.parent.postMessage(msg, '*'); } catch(e) {}
}

window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || !d.type) return;
  switch (d.type) {
    case 'setZones':
      zones = d.zones || [];
      renderZones();
      break;
    case 'setView':
      if (d.lat && d.lng && map) {
        map.setCenter(new kakao.maps.LatLng(d.lat, d.lng));
        if (d.zoom) {
          var level = Math.max(1, Math.min(14, 20 - d.zoom));
          map.setLevel(level);
        }
      }
      break;
    case 'setMapType':
      if (!map) break;
      var mt = {
        hybrid:    kakao.maps.MapTypeId.HYBRID,
        satellite: kakao.maps.MapTypeId.SKYVIEW,
        normal:    kakao.maps.MapTypeId.ROADMAP
      };
      map.setMapTypeId(mt[d.mapType] || kakao.maps.MapTypeId.HYBRID);
      break;
    case 'setDrawMode': setDrawMode(d.enabled); break;
    case 'filterZone':  activeZoneId = d.zoneId; renderZones(); break;
    case 'clearFilter': activeZoneId = null; renderZones(); break;
    case 'ping':
      if (map) { postUp({ type: 'mapReady' }); }
      else { _parentPinged = true; } // map 준비 전 ping → 초기화 완료 시 응답
      break;
    case 'resize':
      sizeContainers();
      if (map) map.relayout();
      break;
  }
});

// ── 구역 렌더링 (SVG 폴리곤, 구형 boxCoords 호환) ──────────────
function _zoneToPoints(z) {
  // 신형: polygonPoints JSON 배열
  if (z.polygonPoints) {
    try { var p = JSON.parse(z.polygonPoints); if (Array.isArray(p) && p.length >= 3) return p; } catch(e) {}
  }
  // 구형: boxCoords {left,top,width,height} → 사각형 4점으로 변환
  if (z.boxCoords) {
    try {
      var c = JSON.parse(z.boxCoords);
      if (c.left != null) return [
        {x: c.left,           y: c.top           },
        {x: c.left + c.width, y: c.top           },
        {x: c.left + c.width, y: c.top + c.height},
        {x: c.left,           y: c.top + c.height}
      ];
    } catch(e) {}
  }
  return null;
}

function _centroid(pts) {
  var sx = 0, sy = 0;
  pts.forEach(function(p) { sx += p.x; sy += p.y; });
  return { x: sx / pts.length, y: sy / pts.length };
}

function renderZones() {
  var ol = document.getElementById('overlay');
  ol.innerHTML = '';

  // SVG: viewBox 0 0 100 100 → % 좌표 그대로 사용
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible';

  zones.forEach(function(z, i) {
    var pts = _zoneToPoints(z);
    if (!pts || pts.length < 3) return;
    var isAct = activeZoneId === z.zoneId;
    var color = ZONE_COLORS[i % ZONE_COLORS.length];
    var cnt   = z.itemCount || 0;

    // 폴리곤
    var pointsStr = pts.map(function(p) { return p.x + ' ' + p.y; }).join(' ');
    var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pointsStr);
    poly.setAttribute('fill',           color + (isAct ? '55' : '28'));
    poly.setAttribute('stroke',         color);
    poly.setAttribute('stroke-width',   isAct ? '0.7' : '0.4');
    poly.setAttribute('stroke-linejoin','round');
    poly.style.cssText = 'pointer-events:auto;cursor:pointer';
    poly.addEventListener('click', function(ev) {
      ev.stopPropagation();
      postUp({ type: 'zoneClick', zoneId: z.zoneId });
    });
    svg.appendChild(poly);

    // 꼭짓점 점 (확대 시 가이드용)
    pts.forEach(function(p) {
      var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
      dot.setAttribute('r', '0.6');
      dot.setAttribute('fill', color); dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', '0.25');
      dot.style.pointerEvents = 'none';
      svg.appendChild(dot);
    });

    // 라벨
    var cen = _centroid(pts);
    var fo  = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
    fo.setAttribute('x', cen.x - 12); fo.setAttribute('y', cen.y - 5);
    fo.setAttribute('width', '24'); fo.setAttribute('height', '10');
    fo.style.pointerEvents = 'none';
    fo.style.overflow = 'visible';
    fo.innerHTML = '<div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;align-items:center;justify-content:center;'
      + 'font-size:1.5px;font-weight:800;color:#fff;text-shadow:0 0.3px 1.5px rgba(0,0,0,.9);text-align:center;white-space:nowrap">'
      + (z.zoneName || z.zoneId)
      + (cnt ? '<span style="font-size:1.1px;opacity:.9">' + cnt + '건</span>' : '')
      + '</div>';
    svg.appendChild(fo);
  });
  ol.appendChild(svg);
}

// ── 폴리곤 드로잉 ───────────────────────────────────────────────
function setDrawMode(on) {
  drawMode = on;
  polyPts   = [];
  previewPt = null;
  var canvas = document.getElementById('draw-canvas');
  var banner = document.getElementById('draw-banner');
  if (on) {
    if (map) { map.setDraggable(false); map.setZoomable(false); }
    sizeContainers();
    canvas.style.display      = 'block';
    canvas.style.pointerEvents = 'auto';
    canvas.style.cursor        = 'crosshair';
    if (banner) { banner.textContent = '✦ 클릭으로 꼭짓점 추가 | 첫 점 클릭 또는 Enter로 완료 | ESC 취소'; banner.style.display = 'block'; }
    bindPolyEvents(canvas);
  } else {
    if (map) { map.setDraggable(true); map.setZoomable(true); }
    canvas.style.display       = 'none';
    canvas.style.pointerEvents = 'none';
    if (banner) banner.style.display = 'none';
    clearCanvas();
    polyPts = []; previewPt = null;
  }
}

function bindPolyEvents(canvas) {
  // 중복 바인딩 방지
  if (canvas._polyBound) return;
  canvas._polyBound = true;

  canvas.addEventListener('mousemove', function(e) {
    previewPt = canvasPct(canvas, e);
    redrawPoly(canvas);
  });

  canvas.addEventListener('click', function(e) {
    if (!drawMode) return;
    var pt = canvasPct(canvas, e);
    // 첫 꼭짓점 근접 → 폴리곤 완성
    if (polyPts.length >= 3 && isNearFirst(canvas, e)) {
      finishPoly();
      return;
    }
    polyPts.push(pt);
    redrawPoly(canvas);
  });

  canvas.addEventListener('dblclick', function(e) {
    if (polyPts.length >= 3) finishPoly();
  });

  // 터치 지원
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    var pt = canvasPct(canvas, t);
    if (polyPts.length >= 3 && isNearFirst(canvas, t)) { finishPoly(); return; }
    polyPts.push(pt);
    redrawPoly(canvas);
  }, { passive: false });

  document.addEventListener('keydown', function(e) {
    if (!drawMode) return;
    if (e.key === 'Enter' && polyPts.length >= 3) { finishPoly(); }
    if (e.key === 'Escape') { cancelPoly(); }
    if (e.key === 'Backspace' && polyPts.length) {
      polyPts.pop();
      redrawPoly(document.getElementById('draw-canvas'));
    }
  });
}

function canvasPct(canvas, e) {
  var r = canvas.getBoundingClientRect();
  return {
    x: +((e.clientX - r.left) / r.width  * 100).toFixed(2),
    y: +((e.clientY - r.top)  / r.height * 100).toFixed(2)
  };
}

function isNearFirst(canvas, e) {
  if (!polyPts.length) return false;
  var r = canvas.getBoundingClientRect();
  var fx = polyPts[0].x / 100 * r.width  + r.left;
  var fy = polyPts[0].y / 100 * r.height + r.top;
  var dx = e.clientX - fx, dy = e.clientY - fy;
  return Math.sqrt(dx*dx + dy*dy) <= CLOSE_DIST;
}

function redrawPoly(canvas) {
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  if (!polyPts.length) return;

  var toX = function(p) { return p.x / 100 * W; };
  var toY = function(p) { return p.y / 100 * H; };

  // 채우기 (3점 이상)
  if (polyPts.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(toX(polyPts[0]), toY(polyPts[0]));
    for (var i = 1; i < polyPts.length; i++) ctx.lineTo(toX(polyPts[i]), toY(polyPts[i]));
    if (previewPt) ctx.lineTo(toX(previewPt), toY(previewPt));
    if (polyPts.length >= 3) {
      ctx.closePath();
      ctx.fillStyle = 'rgba(59,130,246,0.18)';
      ctx.fill();
    }
    ctx.strokeStyle = '#3B82F6';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();
  }

  // 프리뷰 점선
  if (previewPt && polyPts.length >= 1) {
    var last = polyPts[polyPts.length - 1];
    ctx.beginPath();
    ctx.moveTo(toX(last), toY(last));
    ctx.lineTo(toX(previewPt), toY(previewPt));
    ctx.strokeStyle = 'rgba(59,130,246,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 꼭짓점 점
  polyPts.forEach(function(p, idx) {
    var nearFirst = idx === 0 && polyPts.length >= 3 && previewPt && isNearFirst(canvas, { clientX: toX(previewPt) + canvas.getBoundingClientRect().left, clientY: toY(previewPt) + canvas.getBoundingClientRect().top });
    ctx.beginPath();
    ctx.arc(toX(p), toY(p), idx === 0 ? 7 : 5, 0, Math.PI * 2);
    ctx.fillStyle = idx === 0 ? (nearFirst ? '#10B981' : '#F59E0B') : '#3B82F6';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 첫 점 근접 가이드 원
  if (polyPts.length >= 3) {
    ctx.beginPath();
    ctx.arc(toX(polyPts[0]), toY(polyPts[0]), CLOSE_DIST, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(16,185,129,0.45)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function finishPoly() {
  if (polyPts.length < 3) return;
  var center = map.getCenter();
  postUp({
    type:           'zoneDrawn',
    polygonPoints:  JSON.stringify(polyPts),
    mapLat:         center.getLat(),
    mapLng:         center.getLng(),
    mapZoom:        map.getLevel()
  });
  polyPts = []; previewPt = null;
  clearCanvas();
  setDrawMode(false);
  postUp({ type: 'drawModeOff' }); // 부모 버튼 상태 복구
}

function cancelPoly() {
  polyPts = []; previewPt = null;
  clearCanvas();
  setDrawMode(false);
  postUp({ type: 'drawModeOff' });
}

function clearCanvas() {
  var c = document.getElementById('draw-canvas');
  if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

// ── 시작 ─────────────────────────────────────────────
kakao.maps.load(function() {
  initMap();
});
</script>
</body>
</html>
